name: personal_finance_tracker
description: "Đồ án Điện toán đám mây - Quản lý thu chi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  http: ^1.2.0
  dio: ^5.9.2
  jwt_decoder: ^2.0.1
  image_picker: ^1.0.7
  intl: ^0.19.0
  provider: ^6.1.1
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.0
  shared_preferences: ^2.2.3
  cloud_firestore: ^5.0.2
  firebase_messaging: ^15.2.10
  path_provider: ^2.1.5
  flutter_pdfview: ^1.4.4
  share_plus: ^13.0.0
  flutter_native_splash: ^2.4.7
  html_to_pdf_plus: ^1.0.7
  fl_chart: ^0.70.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#ffffff"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/